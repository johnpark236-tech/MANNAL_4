<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌸 알쏭달쏭 사자성어 챌린지 🌸</title>
    <link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #FFF0F5;
            font-family: 'Jua', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            color: #333;
        }
        
        .card {
            background: white;
            padding: 30px;
            border-radius: 30px;
            box-shadow: 0 10px 25px rgba(255, 105, 180, 0.2);
            width: 90%;
            max-width: 400px;
            text-align: center;
            border: 4px solid #FFC0CB;
        }

        h1 {
            color: #FF69B4;
            font-size: 28px;
            margin-bottom: 5px;
            text-shadow: 1px 1px 2px rgba(255, 182, 193, 0.5);
        }

        /* 인트로 및 난이도 선택 화면 전용 스타일 */
        #intro-screen h1, #difficulty-screen h1 {
            font-size: 32px;
            margin-bottom: 20px;
        }
        #intro-screen p, #difficulty-screen p {
            font-size: 18px;
            color: #8B008B;
            margin-bottom: 30px;
        }
        
        .start-btn {
            font-family: 'Jua', sans-serif;
            background: #FF69B4;
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 20px;
            font-size: 20px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 6px rgba(255, 105, 180, 0.4);
            margin-top: 10px;
        }
        .start-btn:hover {
            background: #FF1493;
            transform: translateY(-2px);
        }

        /* 난이도 선택 버튼 스타일 */
        .diff-options {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 20px;
        }
        .diff-btn {
            font-family: 'Jua', sans-serif;
            background: #f8f8f8;
            color: #333;
            border: 3px solid #FFC0CB;
            padding: 15px;
            border-radius: 15px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
        }
        .diff-btn:hover {
            background: #FFE4E1;
            border-color: #FF69B4;
            transform: translateY(-2px);
        }

        /* 메인 게임 화면 스타일 (초기 숨김) */
        #difficulty-screen, #app {
            display: none; 
        }

        .level-info {
            background: #FFE4E1;
            color: #D11585;
            padding: 8px 15px;
            border-radius: 20px;
            display: inline-block;
            font-size: 16px;
            margin-bottom: 20px;
        }
        .progress {
            font-size: 14px;
            color: #FF69B4;
            margin-bottom: 10px;
        }
        .question-box {
            margin-bottom: 25px;
        }
        .hanja {
            font-size: 40px; 
            font-weight: bold;
            color: #C71585;
            letter-spacing: 2px;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.05);
        }
        .question-text {
            font-size: 18px;
            color: #8B008B;
        }
        .options {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        /* 선택지 버튼 스타일 (핑크 바탕 + 흰색 글씨) */
        button.option-btn {
            font-family: 'Jua', sans-serif;
            background: #FF69B4; 
            color: white;        
            font-weight: bold;
            border: 2px solid #FF69B4; 
            padding: 15px;
            border-radius: 20px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px rgba(255, 105, 180, 0.4);
        }
        
        button.option-btn:hover {
            background: #FF1493; 
            border: 2px solid #FF1493;
            transform: translateY(-2px);
        }
        button.option-btn:active {
            transform: translateY(1px);
        }
        
        #message {
            margin-top: 20px;
            font-size: 16px;
            color: #FF1493;
            height: 60px; 
            line-height: 1.4;
        }
    </style>
</head>
<body>

<div id="intro-screen" class="card">
    <h1>MANNAL 사자성어</h1>
    <p>사자성어 마스터를 향한<br>알쏭달쏭 여정을 떠나볼까요?</p>
    <button class="start-btn" onclick="goToDifficultySelection()">신나게 시작해 보자 확인!</button>
</div>

<div id="difficulty-screen" class="card">
    <h1>🎯 난이도 선택</h1>
    <p>도전할 난이도를 골라주세요!</p>
    <div class="diff-options">
        <button class="diff-btn" onclick="startGame('초급')">🌱 초급 (Beginner)</button>
        <button class="diff-btn" onclick="startGame('중급')">🌿 중급 (Intermediate)</button>
        <button class="diff-btn" onclick="startGame('고급')">🔥 고급 (Advanced)</button>
    </div>
</div>

<div id="app" class="card">
    <h1>🌸 사자성어 챌린지 🌸</h1>
    <div class="level-info" id="level-display">Level 1</div>
    <div class="progress" id="progress-display">현재 레벨 진행도: 0 / 1</div>
    
    <div class="question-box">
        <div class="hanja" id="hanja-display"></div>
        <div class="question-text">이 사자성어의 풀이에 맞는 것은?</div>
    </div>

    <div class="options" id="options-container"></div>

    <div id="message"></div>
</div>

<script>
    /* =======================================================
       🔊 효과음 (Web Audio API) 설정 
       ======================================================= */
    const AudioContext = window.AudioContext || window.webkitAudioContext;
    let audioCtx;

    function initAudio() {
        if (!audioCtx) {
            audioCtx = new AudioContext();
        }
        if (audioCtx.state === 'suspended') {
            audioCtx.resume();
        }
    }

    function playTone(freq, type, duration, startTime) {
        if (!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime + startTime);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start(audioCtx.currentTime + startTime);
        gain.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + startTime + duration);
        osc.stop(audioCtx.currentTime + startTime + duration);
    }

    function playDingDong() {
        initAudio();
        playTone(659.25, 'sine', 0.5, 0);       // 미(E5)
        playTone(523.25, 'sine', 0.5, 0.4);     // 도(C5)
    }

    function playBeepBeep() {
        initAudio();
        playTone(300, 'square', 0.2, 0);        
        playTone(300, 'square', 0.2, 0.3);      
    }

    window.onload = () => {
        document.body.addEventListener('click', initAudio, { once: true });
        try { playDingDong(); } catch(e) {} 
    };

    /* =======================================================
       🚀 게임 메인 로직 및 데이터베이스
       ======================================================= */
    
    const idiomDB = [
        // 🌱 초급 사자성어
        { difficulty: "초급", hanja: "一就月將", hangul: "일취월장", meaning: "날로 달로 나아지거나 발전함" },
        { difficulty: "초급", hanja: "大器晩成", hangul: "대기만성", meaning: "큰 사람이 되기 위해서는 많은 노력과 시간이 필요함" },
        { difficulty: "초급", hanja: "作心三日", hangul: "작심삼일", meaning: "단단히 먹은 마음이 사흘을 가지 못함" },
        { difficulty: "초급", hanja: "結者解之", hangul: "결자해지", meaning: "일을 맺은 사람이 풀어야 한다는 뜻으로, 일을 저지른 사람이 해결해야 함" },
        { difficulty: "초급", hanja: "苦盡甘來", hangul: "고진감래", meaning: "고생 끝에 낙이 온다" },
        { difficulty: "초급", hanja: "雪上加霜", hangul: "설상가상", meaning: "눈 위에 서리가 덮인다는 뜻으로, 엎친 데 덮친 격" },
        
        // 🌿 중급 사자성어
        { difficulty: "중급", hanja: "見蚊拔劍", hangul: "견문발검", meaning: "모기를 보고 칼을 뺀다는 뜻으로, 사소한 일에 크게 성내어 덤빔" },
        { difficulty: "중급", hanja: "伯牙絶絃", hangul: "백아절현", meaning: "자기를 알아주는 절친한 벗의 죽음을 슬퍼함" },
        { difficulty: "중급", 파자: "塞翁之馬", hangul: "새옹지마", meaning: "인생의 길흉화복은 변화가 많아 예측하기 어려움" },
        { difficulty: "중급", hanja: "脣亡齒寒", hangul: "순망치한", meaning: "입술이 없으면 이가 시리다는 뜻으로, 가까운 사이의 한쪽이 망하면 다른 한쪽도 위험해짐" },
        { difficulty: "중급", hanja: "羊頭狗肉", hangul: "양두구육", meaning: "양 머리를 걸어놓고 개고기를 판다는 뜻으로, 겉과 속이 다름" },
        { difficulty: "중급", hanja: "兎死狗烹", hangul: "토사구팽", meaning: "토끼가 죽으면 사냥개도 삶아 먹힌다는 뜻으로, 필요할 때는 쓰고 필요 없을 때는 버림" },
        
        // 🔥 고급 사자성어 
        { difficulty: "고급", hanja: "囊中之錐", hangul: "낭중지추", meaning: "주머니 속의 송곳이라는 뜻으로, 재능이 뛰어난 사람은 숨어 있어도 저절로 드러남" },
        { difficulty: "고급", hanja: "狐假虎威", hangul: "호가호위", meaning: "여우가 호랑이의 위세를 빌린다는 뜻으로, 남의 권세를 빌려 허세를 부림" },
        { difficulty: "고급", hanja: "畵龍點睛", hangul: "화룡점정", meaning: "용을 그리고 마지막으로 눈동자를 찍는다는 뜻으로, 가장 중요한 부분을 완성함" },
        { difficulty: "고급", hanja: "群鷄一鶴", hangul: "군계일학", meaning: "여러 평범한 사람들 가운데 뛰어난 한 사람" },
        { difficulty: "고급", hanja: "換骨奪胎", hangul: "환골탈태", meaning: "낡은 제도나 관습을 고쳐 모습이 완전히 새롭게 바뀜" },
        { difficulty: "고급", hanja: "錦衣還鄕", hangul: "금의환향", meaning: "비단옷을 입고 고향에 돌아온다는 뜻으로, 출세하여 고향에 돌아옴" }
    ];

    let fullDifficultyDB = []; // 🔥 선택한 난이도의 원본 데이터를 보존할 배열
    let filteredDB = []; 
    let currentLevel = 1;
    const maxLevel = 100;
    let questionsToAnswer = 1; 
    let currentQuestionCount = 0; 
    let currentCorrectAnswer = "";

    const introScreen = document.getElementById("intro-screen");
    const difficultyScreen = document.getElementById("difficulty-screen");
    const appScreen = document.getElementById("app");
    const levelDisplay = document.getElementById("level-display");
    const progressDisplay = document.getElementById("progress-display");
    const hanjaDisplay = document.getElementById("hanja-display");
    const optionsContainer = document.getElementById("options-container");
    const messageDisplay = document.getElementById("message");

    function goToDifficultySelection() {
        initAudio(); 
        introScreen.style.display = "none";
        difficultyScreen.style.display = "block";
    }

    function startGame(selectedDifficulty) {
        initAudio();
        
        // 🔥 선택한 난이도의 원본 데이터를 따로 저장해둡니다. (오답 생성용)
        fullDifficultyDB = idiomDB.filter(item => item.difficulty === selectedDifficulty);
        
        // 🔥 처음 시작할 땐 원본 데이터를 복사해서 문제 은행을 만듭니다.
        filteredDB = [...fullDifficultyDB];
        
        difficultyScreen.style.display = "none";
        appScreen.style.display = "block";
        
        levelDisplay.innerText = `${selectedDifficulty} - Level 1`;
        
        generateQuestion();
    }

    function shuffleArray(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
    }

    // 🔥 단계별로 강도가 높아지는 팝업 축하 메시지 생성기 (MZ 트렌드 반영)
    function getLevelUpPopupMessage(level) {
        if (level <= 5) return `[레벨 ${level} 달성]\n오! 폼 미쳤다! 시작부터 찢었어! 천재만재의 등장! 🌟`;
        if (level <= 10) return `[레벨 ${level} 달성]\n와... 두뇌 회전 속도 실화임? 슈퍼컴퓨터도 울고 갈 지능! 🧠🔥`;
        if (level <= 20) return `[레벨 ${level} 달성]\n당신... 혹시 전생에 집현전 학자? 세종대왕님이 박수 치고 계심! 👏👑`;
        if (level <= 30) return `[레벨 ${level} 달성]\n이 정도면 사자성어 1타 강사! 지나가던 강아지도 당신의 지식에 무릎을 탁 칩니다! 🐶💥`;
        if (level <= 40) return `[레벨 ${level} 달성]\n우주 대폭발급 지식! NASA에서 당신의 뇌를 연구하고 싶어 안달 났어요! 🚀🌌`;
        if (level <= 50) return `[레벨 ${level} 달성]\n지구상에 존재하는 모든 책을 흡수한 자! 당신이 걷는 길이 곧 역사가 됩니다! 📚🚶‍♂️`;
        if (level <= 60) return `[레벨 ${level} 달성]\n아인슈타인: '아앗... 내가 졌다.' 역대급 천재성! 당장 노벨상 받으러 가세요! 🏆🥇`;
        if (level <= 70) return `[레벨 ${level} 달성]\n당신의 뇌세포 하나하나가 다이아몬드로 이루어진 게 분명함! 눈부셔! 💎✨`;
        if (level <= 80) return `[레벨 ${level} 달성]\n신이 인간을 만들 때 지능 스탯을 당신에게 몰빵했음! 우주 최강 지식인! 🌌👑`;
        if (level <= 90) return `[레벨 ${level} 달성]\n당신이 숨 쉴 때마다 지식의 향기가 퍼져 나갑니다! 걸어 다니는 백과사전 그 자체! 🌸📖`;
        if (level <= 99) return `[레벨 ${level} 달성]\n인류의 진화는 당신을 위해 존재했다! 외계인도 당신의 사자성어 실력에 감격해서 눈물 흘림! 👽😭`;
        return `[레벨 100 마스터 달성!]\n🎉 경축 🎉 우주 최고, 역사상 전무후무한 사자성어 마스터 등극! 오늘 당장 로또 사세요! 무조건 1등 당첨! 💰🎉`;
    }

    // 기존 텍스트 메시지용 (팝업과 별도로 하단 텍스트 창에 보이기 위함)
    function getPraiseMessage(level) {
        if (level <= 10) return `서당 훈장님도 감격해서 울고 갈 실력! 😭👍`;
        if (level <= 40) return `길 가다 돈 주울 관상입니다! 이 기세로 고고! 💸`;
        return `신의 경지! 오늘 당장 로또 사세요! 🚀💰`;
    }

    const MZRewards = [
        "다이어트 안 해도 1kg 순삭! 폼 미쳤다! 🏃‍♀️💨",
        "내일 아침 꿀피부 예약! 여드름 광클 삭제! ✨",
        "길 가다 이상형이 번호 물어봄! 완전 럭키비키잖아 🍀",
        "통장 잔고 떡상! 벼락부자 가즈아 💸🚀",
        "거울 보면 존잘/존예 보스 등극! 갓벽하다 진짜 👑",
        "오늘 먹은 야식 0칼로리 매직 발동! 🍗💖",
        "이번 주 로또 1등 당첨 기운 뿜뿜! 인생 역전! 🎉",
        "갓생 살기 대성공! 주변에서 칭찬 폭격 쏟아짐! 👏"
    ];

    function generateQuestion() {
        messageDisplay.innerText = "";
        progressDisplay.innerText = `현재 레벨 진행도: ${currentQuestionCount} / ${questionsToAnswer}`;
        
        // 🔥 만약 남은 문제(배열)가 0개라면, 문제를 전부 맞춘 것이므로 다시 리필해줍니다.
        // (수천 개의 데이터를 넣으시면 이 메시지를 볼 일이 거의 없겠지만, 만약을 대비한 안전장치입니다!)
        if (filteredDB.length === 0) {
            filteredDB = [...fullDifficultyDB];
        }

        const correctIdiom = filteredDB[Math.floor(Math.random() * filteredDB.length)];
        currentCorrectAnswer = correctIdiom.meaning;
        
        const hangulText = correctIdiom.hangul ? `(${correctIdiom.hangul})` : "";
        hanjaDisplay.innerHTML = `${correctIdiom.hanja || correctIdiom.파자}<br>${hangulText}`;

        // 🔥 오답 보기는 줄어든 배열이 아닌 '전체 원본 배열(fullDifficultyDB)'에서 가져와 
        // 선택지가 4개가 안 되는 버그를 방지합니다.
        let wrongOptions = fullDifficultyDB.filter(item => item.meaning !== currentCorrectAnswer);
        wrongOptions = shuffleArray(wrongOptions).slice(0, 3);

        let options = [correctIdiom.meaning, ...wrongOptions.map(item => item.meaning)];
        options = shuffleArray(options);

        optionsContainer.innerHTML = "";
        options.forEach(optionText => {
            const btn = document.createElement("button");
            btn.className = "option-btn";
            btn.innerText = optionText;
            btn.onclick = () => checkAnswer(optionText);
            optionsContainer.appendChild(btn);
        });
    }

    function checkAnswer(selectedOption) {
        if (selectedOption === currentCorrectAnswer) {
            playDingDong(); 
            currentQuestionCount++;
            
            // 🔥 정답을 맞춘 문제는 문제 배열(filteredDB)에서 영구 제외하여 다시 나오지 않게 합니다.
            filteredDB = filteredDB.filter(item => item.meaning !== currentCorrectAnswer);

            messageDisplay.style.color = "#FF1493";
            messageDisplay.innerText = "정답입니다! 💕";

            setTimeout(() => {
                if (currentQuestionCount >= questionsToAnswer) {
                    if (currentLevel >= maxLevel) {
                        alert(getLevelUpPopupMessage(maxLevel)); // 100레벨 달성 시 전용 팝업 출력
                        return;
                    }
                    currentLevel++;
                    questionsToAnswer = currentLevel; 
                    currentQuestionCount = 0;
                    
                    const currentDifficultyText = levelDisplay.innerText.split(' - ')[0];
                    levelDisplay.innerText = `${currentDifficultyText} - Level ${currentLevel}`;
                    
                    // 🔥 레벨업 시 화면 위에 띄우는 팝업 알림 (점진적으로 칭찬 강화)
                    alert(getLevelUpPopupMessage(currentLevel));

                    const randomReward = MZRewards[Math.floor(Math.random() * MZRewards.length)];
                    messageDisplay.innerHTML = `${getPraiseMessage(currentLevel)}<br><span style="color:#2C5F2D; font-size:15px; font-weight:bold;">🎁 보너스: ${randomReward}</span>`;
                }
                
                const delay = currentQuestionCount === 0 ? 1500 : 800; // 팝업창 닫은 후 대기 시간 조정
                setTimeout(() => {
                    generateQuestion();
                }, delay);

            }, 500); 
        } else {
            playBeepBeep(); 
            messageDisplay.style.color = "red";
            messageDisplay.innerText = "앗! 틀렸어요. 처음부터 다시! 😢";
            currentQuestionCount = 0;
            setTimeout(() => {
                generateQuestion();
            }, 1000);
        }
    }
</script>

</body>
</html>
