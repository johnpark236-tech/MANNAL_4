<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌸 두근두근 사자성어 챌린지 🌸</title>
    <link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet">
    <style>
        /* CSS 변수를 사용하여 유저가 선택한 테마 색상을 전역으로 관리합니다. */
        :root {
            --theme-color: #2C5F2D; /* 기본값: 빈티지 딥 그린 */
        }

        body {
            background-color: #FFF0F5;
            font-family: 'Jua', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            color: #333;
        }
        
        .card {
            background: white;
            padding: 30px;
            border-radius: 30px;
            box-shadow: 0 10px 25px rgba(255, 105, 180, 0.2);
            width: 90%;
            max-width: 400px;
            text-align: center;
            border: 4px solid #FFC0CB;
        }

        h1 {
            color: #FF69B4;
            font-size: 28px;
            margin-bottom: 5px;
            text-shadow: 1px 1px 2px rgba(255, 182, 193, 0.5);
        }

        /* 인트로 및 테마 선택 화면 전용 스타일 */
        #intro-screen h1, #theme-screen h1 {
            font-size: 32px;
            margin-bottom: 20px;
        }
        #intro-screen p, #theme-screen p {
            font-size: 18px;
            color: #8B008B;
            margin-bottom: 30px;
        }
        
        .start-btn {
            font-family: 'Jua', sans-serif;
            background: #FF69B4;
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 20px;
            font-size: 20px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 6px rgba(255, 105, 180, 0.4);
            margin-top: 10px;
        }
        .start-btn:hover {
            background: #FF1493;
            transform: translateY(-2px);
        }

        /* 테마 선택 버튼 스타일 */
        .theme-options {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 20px;
        }
        .theme-btn {
            font-family: 'Jua', sans-serif;
            background: #f8f8f8;
            border: 3px solid transparent;
            padding: 12px;
            border-radius: 15px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
        }
        /* 테마별 버튼 글자색 */
        .theme-btn.green { color: #2C5F2D; }
        .theme-btn.wine { color: #5C0632; }
        .theme-btn.navy { color: #1A237E; }
        
        /* 선택된 테마 테두리 강조 */
        .theme-btn.selected {
            border-color: #FF69B4;
            background: #FFE4E1;
        }

        /* 메인 게임 화면 스타일 (초기 숨김) */
        #theme-screen, #app {
            display: none; 
        }

        .level-info {
            background: #FFE4E1;
            color: #D11585;
            padding: 8px 15px;
            border-radius: 20px;
            display: inline-block;
            font-size: 16px;
            margin-bottom: 20px;
        }
        .progress {
            font-size: 14px;
            color: #FF69B4;
            margin-bottom: 10px;
        }
        .question-box {
            margin-bottom: 25px;
        }
        .hanja {
            font-size: 40px; 
            font-weight: bold;
            color: #C71585;
            letter-spacing: 2px;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.05);
        }
        .question-text {
            font-size: 18px;
            color: #8B008B;
        }
        .options {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        /* 🌟 선택지 버튼 스타일 (CSS 변수 적용) 🌟 */
        button.option-btn {
            font-family: 'Jua', sans-serif;
            background: #FFD1DC; 
            color: var(--theme-color); /* 유저가 선택한 색상 반영 */
            font-weight: bold;
            border: 2px solid #FFD1DC; 
            padding: 15px;
            border-radius: 20px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px rgba(255, 182, 193, 0.4);
        }
        
        button.option-btn:hover {
            background: var(--theme-color); /* 유저가 선택한 색상 반영 */
            color: #FFD1DC;      
            border: 2px solid var(--theme-color);
            transform: translateY(-2px);
        }
        button.option-btn:active {
            transform: translateY(1px);
        }
        
        #message {
            margin-top: 20px;
            font-size: 16px;
            color: #FF1493;
            height: 60px; /* 보상 텍스트를 위해 높이 증가 */
            line-height: 1.4;
        }
    </style>
</head>
<body>

<div id="intro-screen" class="card">
    <h1>MANNAL 사자성어</h1>
    <p>사자성어 마스터를 향한<br>두근두근 여정을 떠나볼까요?</p>
    <button class="start-btn" onclick="goToThemeSelection()">신나게 시작해 보자 확인!</button>
</div>

<div id="theme-screen" class="card">
    <h1>🎨 폰트 테마 선택</h1>
    <p>가장 마음에 드는 색상을 골라주세요!</p>
    <div class="theme-options">
        <button class="theme-btn green selected" onclick="selectTheme('#2C5F2D', this)">빈티지 딥 그린</button>
        <button class="theme-btn wine" onclick="selectTheme('#5C0632', this)">엘레강스 딥 와인</button>
        <button class="theme-btn navy" onclick="selectTheme('#1A237E', this)">소프트 네이비</button>
    </div>
    <button class="start-btn" onclick="startGame()">게임 시작!</button>
</div>

<div id="app" class="card">
    <h1>🌸 사자성어 챌린지 🌸</h1>
    <div class="level-info" id="level-display">Level 1</div>
    <div class="progress" id="progress-display">현재 레벨 진행도: 0 / 1</div>
    
    <div class="question-box">
        <div class="hanja" id="hanja-display"></div>
        <div class="question-text">이 사자성어의 풀이에 맞는 것은?</div>
    </div>

    <div class="options" id="options-container"></div>

    <div id="message"></div>
</div>

<script>
    /* =======================================================
       🔊 효과음 (Web Audio API) 설정 
       ======================================================= */
    const AudioContext = window.AudioContext || window.webkitAudioContext;
    let audioCtx;

    // 브라우저 정책상 사용자 상호작용이 있어야 오디오 문맥이 열립니다.
    function initAudio() {
        if (!audioCtx) {
            audioCtx = new AudioContext();
        }
        if (audioCtx.state === 'suspended') {
            audioCtx.resume();
        }
    }

    // 주파수를 이용해 멜로디 생성하는 함수
    function playTone(freq, type, duration, startTime) {
        if (!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime + startTime);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start(audioCtx.currentTime + startTime);
        gain.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + startTime + duration);
        osc.stop(audioCtx.currentTime + startTime + duration);
    }

    // 띵동! (긍정음 / 인트로 등장음)
    function playDingDong() {
        initAudio();
        playTone(659.25, 'sine', 0.5, 0);       // 미(E5)
        playTone(523.25, 'sine', 0.5, 0.4);     // 도(C5)
    }

    // 삐삐! (부정음)
    function playBeepBeep() {
        initAudio();
        playTone(300, 'square', 0.2, 0);        // 낮고 짧은 소리
        playTone(300, 'square', 0.2, 0.3);      
    }

    // 인트로 화면이 뜰 때 '띵동' 소리 재생을 시도합니다.
    // (크롬 등 일부 브라우저에서는 화면 클릭 전까지 소리가 막힐 수 있습니다)
    window.onload = () => {
        // 혹시 모를 브라우저 차단 방지를 위해 화면의 어느 곳이든 클릭하면 오디오 문맥을 엽니다.
        document.body.addEventListener('click', initAudio, { once: true });
        
        try { playDingDong(); } catch(e) {} 
    };

    /* =======================================================
       🎨 테마 선택 로직
       ======================================================= */
    let selectedColor = '#2C5F2D'; // 기본 색상 설정

    const introScreen = document.getElementById("intro-screen");
    const themeScreen = document.getElementById("theme-screen");
    const appScreen = document.getElementById("app");

    // 인트로에서 테마 선택 창으로 이동
    function goToThemeSelection() {
        initAudio(); // 버튼 클릭 시 오디오 활성화 확정
        introScreen.style.display = "none";
        themeScreen.style.display = "block";
    }

    // 유저가 테마 버튼을 클릭했을 때 처리
    function selectTheme(color, buttonElement) {
        selectedColor = color;
        // 모든 버튼의 selected 클래스 제거 후, 클릭한 버튼에만 추가
        document.querySelectorAll('.theme-btn').forEach(btn => btn.classList.remove('selected'));
        buttonElement.classList.add('selected');
    }


    /* =======================================================
       🚀 게임 메인 로직
       ======================================================= */
    const idiomDB = [
        { hanja: "一就月將", hangul: "일취월장", meaning: "날로 달로 나아지거나 발전함" },
        { hanja: "大器晩成", hangul: "대기만성", meaning: "큰 사람이 되기 위해서는 많은 노력과 시간이 필요함" },
        { hanja: "作心三日", hangul: "작심삼일", meaning: "단단히 먹은 마음이 사흘을 가지 못함" },
        { hanja: "結者解之", hangul: "결자해지", meaning: "일을 맺은 사람이 풀어야 한다는 뜻으로, 일을 저지른 사람이 해결해야 함" },
        { hanja: "苦盡甘來", hangul: "고진감래", meaning: "고생 끝에 낙이 온다" },
        { hanja: "雪上加霜", hangul: "설상가상", meaning: "눈 위에 서리가 덮인다는 뜻으로, 엎친 데 덮친 격" },
        { hanja: "見蚊拔劍", hangul: "견문발검", meaning: "모기를 보고 칼을 뺀다는 뜻으로, 사소한 일에 크게 성내어 덤빔" },
        { hanja: "伯牙絶絃", hangul: "백아절현", meaning: "자기를 알아주는 절친한 벗의 죽음을 슬퍼함" },
        { 파자: "塞翁之馬", hangul: "새옹지마", meaning: "인생의 길흉화복은 변화가 많아 예측하기 어려움" },
        { hanja: "脣亡齒寒", hangul: "순망치한", meaning: "입술이 없으면 이가 시리다는 뜻으로, 가까운 사이의 한쪽이 망하면 다른 한쪽도 위험해짐" },
        { hanja: "羊頭狗肉", hangul: "양두구육", meaning: "양 머리를 걸어놓고 개고기를 판다는 뜻으로, 겉과 속이 다름" },
        { hanja: "兎死狗烹", hangul: "토사구팽", meaning: "토끼가 죽으면 사냥개도 삶아 먹힌다는 뜻으로, 필요할 때는 쓰고 필요 없을 때는 버림" }
    ];

    let currentLevel = 1;
    const maxLevel = 100;
    let questionsToAnswer = 1; 
    let currentQuestionCount = 0; 
    let currentCorrectAnswer = "";

    const levelDisplay = document.getElementById("level-display");
    const progressDisplay = document.getElementById("progress-display");
    const hanjaDisplay = document.getElementById("hanja-display");
    const optionsContainer = document.getElementById("options-container");
    const messageDisplay = document.getElementById("message");

    function startGame() {
        // 선택한 색상을 CSS 변수(--theme-color)에 적용
        document.documentElement.style.setProperty('--theme-color', selectedColor);
        
        themeScreen.style.display = "none";
        appScreen.style.display = "block";
        generateQuestion();
    }

    function shuffleArray(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
    }

    function getPraiseMessage(level) {
        if (level === 2) return "오! 시작이 좋습니다! 천재의 기운이 느껴져요! 🌟";
        if (level <= 5) return `레벨 ${level} 달성! 당신의 두뇌는 스펀지인가요?! 🧠✨`;
        if (level <= 10) return `레벨 ${level}! 서당 훈장님도 감격해서 울고 갈 실력! 😭👍`;
        if (level <= 20) return `레벨 ${level}! 한석봉도 울고 갈 사자성어 마스터! 🖌️🔥`;
        if (level <= 40) return `레벨 ${level}! 길 가다 돈 주울 관상입니다! 💸🏃💨`;
        if (level <= 70) return `레벨 ${level} 돌파! 전생에 조선시대 정1품 대감마님?! 👑✨`;
        return `레벨 ${level}!!! 우주 최강 사자성어 신의 경지! 오늘 당장 로또 사세요! 🚀💰`;
    }

    // 🎁 MZ 세대 맞춤형 센스 있는 보상 텍스트 배열
    const MZRewards = [
        "다이어트 안 해도 1kg 순삭! 폼 미쳤다! 🏃‍♀️💨",
        "내일 아침 꿀피부 예약! 여드름 광클 삭제! ✨",
        "길 가다 이상형이 번호 물어봄! 완전 럭키비키잖아 🍀",
        "통장 잔고 떡상! 벼락부자 가즈아 💸🚀",
        "거울 보면 존잘/존예 보스 등극! 갓벽하다 진짜 👑",
        "오늘 먹은 야식 0칼로리 매직 발동! 🍗💖",
        "이번 주 로또 1등 당첨 기운 뿜뿜! 인생 역전! 🎉",
        "갓생 살기 대성공! 주변에서 칭찬 폭격 쏟아짐! 👏"
    ];

    function generateQuestion() {
        messageDisplay.innerText = "";
        progressDisplay.innerText = `현재 레벨 진행도: ${currentQuestionCount} / ${questionsToAnswer}`;
        
        const correctIdiom = idiomDB[Math.floor(Math.random() * idiomDB.length)];
        currentCorrectAnswer = correctIdiom.meaning;
        
        const hangulText = correctIdiom.hangul ? correctIdiom.hangul : "";
        hanjaDisplay.innerText = `${correctIdiom.hanja || correctIdiom.파자}(${hangulText})`;

        let wrongOptions = idiomDB.filter(item => item.meaning !== currentCorrectAnswer);
        wrongOptions = shuffleArray(wrongOptions).slice(0, 3);

        let options = [correctIdiom.meaning, ...wrongOptions.map(item => item.meaning)];
        options = shuffleArray(options);

        optionsContainer.innerHTML = "";
        options.forEach(optionText => {
            const btn = document.createElement("button");
            btn.className = "option-btn";
            btn.innerText = optionText;
            btn.onclick = () => checkAnswer(optionText);
            optionsContainer.appendChild(btn);
        });
    }

    function checkAnswer(selectedOption) {
        if (selectedOption === currentCorrectAnswer) {
            playDingDong(); // 정답 효과음
            currentQuestionCount++;
            messageDisplay.style.color = "#FF1493";
            messageDisplay.innerText = "정답입니다! 💕";

            setTimeout(() => {
                if (currentQuestionCount >= questionsToAnswer) {
                    if (currentLevel >= maxLevel) {
                        alert("🎉 축하합니다! 100레벨을 모두 클리어하셨습니다! 🎉");
                        return;
                    }
                    currentLevel++;
                    questionsToAnswer = currentLevel; 
                    currentQuestionCount = 0;
                    levelDisplay.innerText = `Level ${currentLevel}`;
                    
                    // 칭찬 문구와 랜덤 보상 텍스트를 조합하여 표시
                    const randomReward = MZRewards[Math.floor(Math.random() * MZRewards.length)];
                    messageDisplay.innerHTML = `${getPraiseMessage(currentLevel)}<br><span style="color:#2C5F2D; font-size:15px; font-weight:bold;">🎁 보너스: ${randomReward}</span>`;
                }
                
                const delay = currentQuestionCount === 0 ? 3000 : 800; // 보상 읽을 시간 3초 부여
                setTimeout(() => {
                    generateQuestion();
                }, delay);

            }, 500); 
        } else {
            playBeepBeep(); // 오답 부정음 효과음
            messageDisplay.style.color = "red";
            messageDisplay.innerText = "앗! 틀렸어요. 처음부터 다시! 😢";
            currentQuestionCount = 0;
            setTimeout(() => {
                generateQuestion();
            }, 1000);
        }
    }
</script>

</body>
</html>
